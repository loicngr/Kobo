name: Bug report
description: Report a problem you're hitting with Kōbō
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below so the issue is actionable.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what went wrong.
      placeholder: The dev server badge stays on "starting" even after the server has been up for a while…
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to observe the bug.
      placeholder: |
        1. Create a workspace with source branch `develop`
        2. Click Start
        3. Send a chat message
        4. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: kobo-version
    attributes:
      label: Kōbō version
      description: Output of `npx @loicngr/kobo --version` or the git commit you are running.
      placeholder: v1.1.1 or develop@abc1234
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: v24.13.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: |
        Paste relevant backend console output, browser devtools errors, or screenshots.
        Please scrub anything sensitive (paths, tokens, Notion URLs).
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I am on a supported Node.js version (≥ 20)
          required: true
