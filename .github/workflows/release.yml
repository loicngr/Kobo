name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, publish and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure release branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "::error::Releases must run from main. Merge develop into main, then push main."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/client/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: src/client
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit client dependencies
        working-directory: src/client
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run backend tests
        run: npm test

      - name: Run frontend tests
        working-directory: src/client
        run: npm test

      - name: Build client and server
        run: npm run build

      - name: Read release version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure version was not already released
        env:
          PACKAGE_NAME: '@loicngr/kobo'
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump package.json before merging to main."
            exit 1
          fi

          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::error::$PACKAGE_NAME@$VERSION is already published on npm. Bump package.json before merging to main."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance

      - name: Push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            **Kōbō** — multi-workspace orchestrator for Claude Code and OpenAI Codex agents.

            ## Install

            Pinned to this release:

            ```bash
            SERVER_PORT=9997 PORT=9998 npx @loicngr/kobo@${{ steps.version.outputs.version }}
            ```

            Or stay on the moving tip:

            ```bash
            SERVER_PORT=9997 PORT=9998 npx @loicngr/kobo@latest
            ```

            Then open <http://localhost:9997>. Pick any free pair of ports — `SERVER_PORT` is read first, `PORT` is its fallback (default `3000`).

            Requires Node.js ≥ 20 and a logged-in Claude Code **or** Codex CLI.

            ## Documentation (this release)

            - [README](https://github.com/loicngr/Kobo/blob/${{ steps.version.outputs.tag }}/README.md) — what Kōbō does and how to run it
            - [CONFIGURATION.md](https://github.com/loicngr/Kobo/blob/${{ steps.version.outputs.tag }}/CONFIGURATION.md) — every env var, every setting, MCP / Notion / Sentry / Voice setup
            - [AGENTS.md](https://github.com/loicngr/Kobo/blob/${{ steps.version.outputs.tag }}/AGENTS.md) — architecture, conventions, contribution guide

            ## Links

            - npm: [`@loicngr/kobo@${{ steps.version.outputs.version }}`](https://www.npmjs.com/package/@loicngr/kobo/v/${{ steps.version.outputs.version }})
            - Bugs & feature requests: [Issue tracker](https://github.com/loicngr/Kobo/issues)
